<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Health Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      padding: 20px;
      color: #1f2937;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 25px;
    }

    .time-box {
      background: #eff6ff;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 18px;
      text-align: center;
      font-size: 14px;
      color: #1e40af;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .bp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .context-btn {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }

    .context-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.2s;
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      background: white;
      color: #111827;
      margin-top: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      display: none;
      font-size: 14px;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .warning-card {
      margin-top: 20px;
      padding: 15px;
      border-radius: 14px;
      background: #fef2f2;
      border-left: 5px solid #dc2626;
      display: none;
    }

    .warning-card h3 {
      color: #991b1b;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #6b7280;
    }

    @media (max-width: 480px) {
      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>Patient Health Monitor</h1>
      <p class="subtitle">Quick Daily Vitals Entry</p>

      <div class="time-box" id="datetimeBox">
        Loading date & time...
      </div>

      <form id="healthForm">

        <div class="form-group">
          <label>Pulse Rate (BPM)</label>
          <input type="number" id="pulse" placeholder="Example: 72" required>
        </div>

        <div class="form-group">
          <label>Blood Pressure</label>
          <div class="bp-grid">
            <input type="number" id="systolic" placeholder="Systolic" required>
            <input type="number" id="diastolic" placeholder="Diastolic" required>
          </div>
        </div>

        <div class="form-group">
          <label>Oxygen Saturation (SpO₂ %)</label>
          <input type="number" id="spo2" placeholder="Example: 97" required>
        </div>

        <div class="form-group">
          <label>Symptoms</label>
          <select id="symptoms">
            <option value="No Symptoms">No Symptoms</option>
            <option value="Chest Pain">Chest Pain</option>
            <option value="Shortness of Breath">Shortness of Breath</option>
            <option value="Dizziness">Dizziness</option>
            <option value="Fatigue">Fatigue</option>
            <option value="Weakness">Weakness</option>
            <option value="Palpitations">Palpitations</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Reading Context</label>
          <div class="button-group">
            <button type="button" class="context-btn active" data-context="Before Medicine">Before Medicine</button>
            <button type="button" class="context-btn" data-context="After Medicine">After Medicine</button>
            <button type="button" class="context-btn" data-context="Resting">Resting</button>
            <button type="button" class="context-btn" data-context="Emergency">Emergency</button>
          </div>
        </div>

        <div class="form-group">
          <label>Notes (Optional)</label>
          <textarea id="notes" rows="3" placeholder="Optional notes..."></textarea>
        </div>

        <button class="submit-btn" type="submit">
          Save Reading
        </button>

        <button type="button" class="secondary-btn" onclick="openMedicinePage()">
          Medicine Change Log
        </button>

      </form>

      <div class="status success" id="successBox">
        Reading saved successfully.
      </div>

      <div class="warning-card" id="warningCard">
        <h3>Critical Reading Alert</h3>
        <p id="warningText"></p>
      </div>

      <div class="footer-note">
        Designed for fast entry & continuous patient monitoring.
      </div>

    </div>
  </div>

<script>
// ======================================================
// 🔥 SUPABASE LAYER (ALL DATABASE CODE IN ONE PLACE)
// ======================================================

const SUPABASE_URL = "https://yvcbuzjryivboukwalyc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2Y2J1empyeWl2Ym91a3dhbHljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDYxNDAsImV4cCI6MjA5NDc4MjE0MH0.1R4XTQhzKUgkbDDLegKyjMLM-JVTk7ScSjvD16m3gWM";

let supabaseClient = null;

// INIT ONLY ONCE
function initSupabase() {
  try {
    if (!SUPABASE_URL.includes("http")) return;

    supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    console.log("Supabase connected");
  } catch (err) {
    console.log("Supabase init failed:", err);
  }
}

initSupabase();

// =============================
// SAVE PATIENT READING
// =============================
function saveReadingToDB(data) {
  if (!supabaseClient) return;

 supabaseClient
  .from("patient_readings")
  .insert([data])
  .then((res) => {
    console.log("SUPABASE FULL RESPONSE:", res);
  })
  .catch((err) => {
    console.log("SUPABASE ERROR FULL:", JSON.stringify(err, null, 2));
  });
}

// =============================
// SAVE MEDICINE BASE
// =============================
function saveMedicineBaseToDB(baseName, medicines) {
  if (!supabaseClient) return;

  supabaseClient
    .from("medicine_bases")
    .insert([
      {
        base_name: baseName,
        medicines: medicines,
        changed_by: "user"
      }
    ])
    .then(({ error }) => {
      if (error) console.log("Medicine DB Error:", error);
    });
}
  // =============================
  // DATE & TIME
  // =============================

  function updateDateTime() {
    const now = new Date();

    const formatted = now.toLocaleString('en-US', {
      year: 'numeric',
      month: 'short',
      day: 'numeric',
      hour: 'numeric',
      minute: '2-digit'
    });

    document.getElementById('datetimeBox').innerText = formatted;
  }

  updateDateTime();
  setInterval(updateDateTime, 1000);


  // =============================
  // CONTEXT BUTTONS
  // =============================

  let selectedContext = 'Before Medicine';

  const contextButtons = document.querySelectorAll('.context-btn');

  contextButtons.forEach(button => {
    button.addEventListener('click', () => {

      contextButtons.forEach(btn => btn.classList.remove('active'));

      button.classList.add('active');

      selectedContext = button.dataset.context;
    });
  });


  // =============================
  // FORM SUBMISSION
  // =============================

  document.getElementById('healthForm').addEventListener('submit', function(e) {

    e.preventDefault();

    const pulse = parseInt(document.getElementById('pulse').value);
    const systolic = parseInt(document.getElementById('systolic').value);
    const diastolic = parseInt(document.getElementById('diastolic').value);
    const spo2 = parseInt(document.getElementById('spo2').value);
    const symptoms = document.getElementById('symptoms').value;
    const notes = document.getElementById('notes').value;

    const data = {
      pulse,
      systolic,
      diastolic,
      spo2,
      symptoms,
      context: selectedContext,
      notes
    };

    console.log('Patient Reading:', data);
saveReadingToDB(data);

    // ========================================
    // REPLACE THIS WITH SUPABASE API LATER
    // ========================================


    // Local temporary storage
    let readings = JSON.parse(localStorage.getItem('PatientReadings')) || [];

    readings.push(data);

    localStorage.setItem('PatientReadings', JSON.stringify(readings));


    // Success Message
    const successBox = document.getElementById('successBox');

    successBox.style.display = 'block';

    setTimeout(() => {
      successBox.style.display = 'none';
    }, 3000);


    // Critical Alerts
    checkCriticalReadings(pulse, systolic, diastolic, spo2);


    // Reset Form
    document.getElementById('healthForm').reset();

  });


  // =============================
  // CRITICAL ALERTS
  // =============================

  function checkCriticalReadings(pulse, systolic, diastolic, spo2) {

    let warnings = [];

    if (pulse < 50) {
      warnings.push('Low Pulse Rate');
    }

    if (pulse > 120) {
      warnings.push('High Pulse Rate');
    }

    if (systolic > 160 || diastolic > 100) {
      warnings.push('High Blood Pressure');
    }

    if (spo2 < 92) {
      warnings.push('Low Oxygen Saturation');
    }

    const warningCard = document.getElementById('warningCard');
    const warningText = document.getElementById('warningText');

    if (warnings.length > 0) {

      warningCard.style.display = 'block';

      warningText.innerText = warnings.join(' | ');

    } else {

      warningCard.style.display = 'none';
    }
  }


  // =============================
  // MEDICINE PAGE PLACEHOLDER
  // =============================

  function openMedicinePage() {
    alert('Medicine Change Log page will be connected next.');
  }

</script>

</body>
</html>
