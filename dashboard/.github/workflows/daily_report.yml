name: Daily Patient Report

on:
  schedule:
    - cron: "0 6 * * *"  # runs daily 6 AM UTC
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas supabase

      - name: Run report
        run: python report_generator.py
